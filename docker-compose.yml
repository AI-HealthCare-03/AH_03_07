services:
  fastapi:
    build: .
    container_name: fastapi1
    expose:
      - "8000"
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - envs/.local.env
    networks:
      - app-network

  ai-worker:
    build: .
    container_name: ai-worker
    restart: always
    env_file:
      - envs/.local.env
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - envs/.local.env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"  # expose 대신 ports로 교체
    env_file:
      - envs/.local.env
    command: >
      sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    networks:
      - app-network
    healthcheck:
      test: >
        sh -c "redis-cli -a $$REDIS_PASSWORD ping"
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: