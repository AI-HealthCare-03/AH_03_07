<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_application_1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_application_1</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // 카드 게임 효과음 (Web Audio API)
    var _audioCtx = null;
    function _getCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      return _audioCtx;
    }
    function cardTone(freq, dur, vol, type, delay) {
      try {
        var c = _getCtx();
        var now = c.currentTime + (delay || 0);
        var o = c.createOscillator();
        var g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = freq;
        o.type = type || 'sine';
        g.gain.setValueAtTime(vol || 0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        o.start(now); o.stop(now + dur);
      } catch(e) {}
    }
    // 카드 뒤집기: 경쾌한 클릭
    window.cardFlip = function() {
      cardTone(800, 0.06, 0.15, 'sine', 0);
    };

    // 매칭 성공: 밝은 3음 상승 (도-미-솔)
    window.cardMatch = function() {
      cardTone(523, 0.12, 0.3, 'sine', 0);
      cardTone(659, 0.12, 0.3, 'sine', 0.1);
      cardTone(784, 0.2,  0.35, 'sine', 0.2);
    };

    // 매칭 실패: 하강 버즈 두 음 (틀렸어!)
    window.cardMiss = function() {
      cardTone(300, 0.12, 0.3, 'sawtooth', 0);
      cardTone(220, 0.18, 0.25, 'sawtooth', 0.13);
    };

    // 연속 정답 콤보: 빠른 상승 4음 + 반짝임
    window.cardCombo = function() {
      [523, 659, 784, 988, 1047].forEach(function(f, i) {
        cardTone(f, 0.1, 0.3, 'sine', i * 0.07);
      });
    };

    // 게임 완료: 화려한 승리 팡파레
    window.cardComplete = function() {
      [523,659,784,659,784,1047].forEach(function(f,i){
        cardTone(f, i===5?0.4:0.15, 0.35, 'sine', i*0.13);
      });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
