  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

</head>
<body>
  <script>
    // 카드 게임 효과음 (Web Audio API)
    var _audioCtx = null;
    function _getCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      return _audioCtx;
    }
    function cardTone(freq, dur, vol, type, delay) {
      try {
        var c = _getCtx();
        var now = c.currentTime + (delay || 0);
        var o = c.createOscillator();
        var g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = freq;
        o.type = type || 'sine';
        g.gain.setValueAtTime(vol || 0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        o.start(now); o.stop(now + dur);
      } catch(e) {}
    }
    window.cardFlip     = function() { cardTone(600, 0.08, 0.2, 'sine', 0); };
    window.cardMatch    = function() { cardTone(523, 0.15, 0.25, 'sine', 0); cardTone(784, 0.15, 0.25, 'sine', 0.12); };
    window.cardMiss     = function() { cardTone(180, 0.2, 0.15, 'sawtooth', 0); };
    window.cardComplete = function() {
      [523,659,784,1047].forEach(function(f,i){ cardTone(f, 0.2, 0.3, 'sine', i*0.15); });
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
