# NFR-MNTN-002: 테스트 자동화·CI
# PR 및 main/feature 브랜치 push 시 자동 실행
name: Flutter CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'feature/**'

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석
        run: flutter analyze lib/ test/ --fatal-warnings

      - name: 단위 테스트
        run: flutter test --coverage --reporter=github

      - name: 커버리지 리포트 업로드
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  build-check:
    name: Build Check (Android)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter SDK 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: Android APK 빌드 확인 (debug)
        run: flutter build apk --debug --dart-define=BASE_URL=https://api.example.com
