name: Sync develop to fork for Vercel deploy

on:
  push:
    branches:
      - develop

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork main (triggers Vercel)
        env:
          GH_TOKEN: ${{ secrets.FORK_DEPLOY_TOKEN }}
        run: |
          gh auth setup-git
          git push https://github.com/lee-shyeok/AH_03_07.git HEAD:main --force
